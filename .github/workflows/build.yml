name: Build Tray App

on:
  push:
    tags: ["v*"]
    branches: [main]
    paths:
      - "tray/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "tray/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tray/src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Add macOS cross-compile targets
        if: startsWith(matrix.platform, 'macos')
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build
        working-directory: tray
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: twox-${{ matrix.label }}
          path: |
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: twox-${{ matrix.label }}
          path: |
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: twox-${{ matrix.label }}
          path: |
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tray/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
